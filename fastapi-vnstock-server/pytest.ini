[pytest]
pythonpath = .
testpaths = tests
markers =
    postgres: requires PostgreSQL (see tests/conftest.py)
    network_vnstock: optional live vnstock/network tests (excluded from CI; set RUN_VNSTOCK_NETWORK=1 locally)
    dnse_live: optional live DNSE broker tests (excluded from CI; set RUN_DNSE_LIVE_TESTS=1 + tokens locally)
    dnse_live_e2e: optional live DNSE place/poll/cancel E2E (also requires RUN_DNSE_LIVE_E2E=1; subset of dnse_live)
